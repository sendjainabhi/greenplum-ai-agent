<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greenplum Analytics & Reporting</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="app-layout">
    <div class="sidebar" id="sidebar">
        <button class="new-chat-btn" onclick="createNewChat()">+ New Chat</button>
        <div class="chat-list-header">Conversations (Max 4)</div>
        <div class="chat-list" id="chatList"></div>
    </div>

    <div class="chat-container" id="appContainer">
        <div class="header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <span>Greenplum AI Analytics Agent</span>
                <div class="status-container">
                    <span id="headerStatusDot" class="status-dot status-unknown"></span>
                    <span id="headerStatusText">Disconnected</span>
                </div>
            </div>
            
            <div class="header-actions">
                <button class="settings-btn" onclick="clearChat()" style="background: transparent;">🗑️ Delete Current Chat</button>
                <button class="settings-btn" id="settingsBtn" onclick="attemptOpenSettings()">⚙️ Settings</button>
            </div>
        </div>

        <div class="messages" id="messages"></div>
        
        <div class="loading-container">
            <span class="loading" id="loading">Agent is processing request...</span>
        </div>
        
        <div class="input-area">
            <div id="suggestionBox" class="suggestion-box"></div>
            <textarea id="prompt" class="chat-input" placeholder="Ask a database question... (Shift+Enter for new line)" rows="1"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendPrompt()">Send</button>
            <button class="send-btn" id="cancelBtn" onclick="cancelRequest()" style="display: none; background: #ef4444; border-color: #ef4444;">Cancel</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="loginModal" style="display: none;">
    <div class="modal-content" style="max-width: 350px;">
        <h3>Admin Login Required</h3>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="authUsername" placeholder="Enter username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="authPassword" placeholder="Enter password" onkeypress="if(event.key === 'Enter') performLogin()">
        </div>
        <div id="loginError" class="test-result test-error" style="display: none; margin-bottom: 15px;">Invalid credentials.</div>
        <div class="modal-actions" style="justify-content: space-between;">
            <button class="btn-cancel" onclick="closeLoginModal()">Cancel</button>
            <button class="btn-save" onclick="performLogin()">Login</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="settingsModal">
    <div class="modal-content">
        <h3>Agent Configuration (Global)</h3>
        
        <div class="form-group" style="background: #f8fafc; padding: 15px; border-radius: 6px; border: 1px dashed #cbd5e1; margin-bottom: 15px;">
            <label style="color: #0369a1; font-size: 0.95em;">📤 Upload Config File</label>
            <input type="file" id="configFileUpload" accept=".properties,.txt" onchange="handleConfigUpload(event)" style="border: none; padding: 5px 0; background: transparent;">
        </div>
        
        <div class="form-group">
            <label>AI Provider Engine</label>
            <select id="provider" onchange="toggleProviderFields()">
                <option value="ollama" selected>Ollama</option>
                <option value="openai">OpenAI Compatible (ChatGPT, vLLM, LMStudio)</option>
                <option value="anthropic">Anthropic (Claude)</option>
            </select>
        </div>
        
        <div class="form-group" id="baseUrlGroup">
            <label id="baseUrlLabel">Endpoint / Base URL</label>
            <input type="text" id="baseUrl">
            <div id="baseUrlHelp" style="font-size: 0.8em; color: #64748b; margin-top: -5px;"></div>
        </div>
        
        <div class="form-group" id="apiKeyGroup">
            <label>Authentication / API Key</label>
            <input type="password" id="apiKey">
            <div id="apiKeyHelp" style="font-size: 0.8em; color: #64748b; margin-top: -5px;"></div>
        </div>
        
        <div class="form-group">
            <label>Model Name</label>
            <input type="text" id="modelName" placeholder="e.g. qwen2.5:32b">
            <div id="modelNameHelp" style="font-size: 0.8em; color: #64748b; margin-top: -5px;">Select a provider to see format</div>
        </div>
        
        <hr style="border: 0; border-top: 1px solid #e5e7eb; margin: 20px 0;">
        
        <div class="form-group">
            <label>MCP Server URL</label>
            <input type="text" id="mcpUrl" placeholder="http://xx.xx.xx.xx:80/mcp">
        </div>
        <div class="form-group">
            <label>MCP Auth Header</label>
            <input type="password" id="mcpAuth" placeholder="Basic key">
        </div>
        
       <div id="testResult" class="test-result"></div>

        <div class="modal-actions">
            <button type="button" class="btn-test" id="testBtn" onclick="testConnection(true)">Test Connection</button>
            <button type="button" class="btn-cancel" onclick="closeSettings()">Cancel</button>
            <button type="button" class="btn-save" onclick="saveSettings()">Save Configuration</button>
        </div>
    </div>
</div>

<script src="/js/app.js?v=5"></script>
</body>
</html>
