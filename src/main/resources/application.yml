server:
  port: 8080
  shutdown: graceful
  compression:
    enabled: true
    mime-types: application/json,text/html,text/css,application/javascript
    min-response-size: 1024
  tomcat:
    max-http-form-post-size: 2MB

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 2MB

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

# Admin PIN — override via ADMIN_PIN env var (e.g. in CF manifest.yml)
admin:
  pin: ${ADMIN_PIN:tanzuadmin}
